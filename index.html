<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Loading Animation Demo</title>
    
    <!-- CSS Tối thiểu để khung giống Webflow -->
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background: #0d0d0d;
            color: #fff;
            font-family: Arial, sans-serif;
            overflow: hidden; /* Cấm cuộn khi đang load */
            width: 100vw;
            height: 100vh;
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #111;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .loading-inner {
            position: relative;
            width: calc(100vw - 32px);
            height: calc(100vh - 32px);
        }

        .loading-content-title {
            position: absolute;
            font-size: 5vw;
            font-weight: bold;
            text-align: center;
            width: max-content;
            left: 0;
            right: 0;
            margin: 0 auto;
        }

        #loading-3d, .loading-3d {
            position: absolute;
            width: 280px;
            height: 310px;
            left: 50%;
            transform: translateX(-50%);
            /* GSAP sẽ điều chỉnh thủ công thuộc tính top của ID này */
        }

        .loading-line-wrap {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0; /* JS sẽ kích hoạt sau */
        }
        
        .loading-line-item {
            position: absolute;
        }

        .loading-content-sub {
            position: absolute;
            bottom: 60px;
            text-align: center;
            width: 100%;
        }

        .loading-content-sub-item-txt {
            display: inline-block;
            margin: 0 10px;
        }

        .loading-progress-item.active {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: #F5F5EF;
        }

        /* Mock CSS cho các element tính toán toạ độ */
        .header { height: 75px; }
        .home-hero-content {
            position: absolute;
            bottom: 20px;
        }
        .line-horizital.top {
            width: 10px; height: 10px;
        }
    </style>
</head>
<body>

    <!-- Giả lập UI của Website -->
    <div class="header"></div>
    <div class="main-inner" data-barba-namespace="home">
        <div class="home-hero-content">
            <div class="line-horizital top"></div>
        </div>
    </div>

    <!-- Container của Loader -->
    <div class="loading">
        <div class="loading-inner">
            <div class="loading-progress-item active"></div>
            
            <svg id="loading-3d" class="loading-3d" viewBox="0 0 280 310"></svg> /* 280 và 310 theo code dx/dy của JS */
            
            <div class="loading-content-title">
                <span>ESTHE</span>
                <span>LABS</span>
            </div>
            
            <div class="loading-line-wrap">
                <div class="loading-line-item item-horizital top-center"></div>
                <div class="loading-line-item item-horizital bot-center"></div>
                <div class="loading-line-item item-vertical"></div>
            </div>

            <div class="loading-content-sub">
                <span class="loading-content-sub-item-txt">Preparing Scene</span>
                <span class="loading-content-sub-item-txt">Building 3D Array</span>
            </div>
        </div>
    </div>

    <!-- CORE LIBRARIES -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <!-- Các biến hệ thống Mock (để đảm bảo không bị lỗi reference từ file index.js) -->
    <script>
        // Fake viewport object
        window.viewport = { w: window.innerWidth, h: window.innerHeight };

        // Fake hàm cvUnit (Quy đổi REM to PX)
        window.cvUnit = function(value, unit) {
            if (unit === 'rem') return value * 10;
            return value;
        }

        // Fake SplitText plugin nếu không có bản quyền
        if (typeof SplitText === 'undefined') {
            window.SplitText = class {
                constructor(selector) {
                    this.words = document.querySelectorAll(selector + ' span');
                }
            }
        }
        
        // Fake Mouse class do bạn có dùng `const mouse = new Mouse()` và `mouse.mousePos` ở cuối TL
        class Mouse {
            constructor() { this.mousePos = {x: 0, y: 0}; }
        }
        window.Mouse = Mouse;

        // Fake hàm isMouseInArea
        function isMouseInArea() { return false; }
    </script>
    
    <!-- Load Scripts Logic Chính (Bao gồm file của bạn) -->
    <script src="./index.js"></script>
    
    <!-- KHỞI CHẠY LOADER -->
    <script>
        $(document).ready(function() {
            // Khởi tạo instance của Loader (giả định class Loader có sẵn toàn cầu từ index.js)
            const loaderObj = new Loader();
            
            // Hàm fake oncePlay để tránh lỗi khi Animation hoàn thành gọi callback
            loaderObj.oncePlay = function(data) {
                console.log("Timeline End - Triggering oncePlay()");
                gsap.to('.loading', {opacity: 0, duration: 0.5, onComplete: () => {
                    $('.loading').css('pointer-events', 'none'); 
                }});
            };

            // Hàm init sẽ nạp các thông tin ban đầu, tạo timeline tlLoading & tlLoadMaster
            loaderObj.init({}); 

            // Kick-start vòng lặp 3D
            if (loaderObj.play3d) {
                loaderObj.play3d();
            }

            // Play Master GSAP Timeline 
            if(loaderObj.tlLoadMaster) {
                loaderObj.tlLoadMaster.play();
            }
        });
    </script>
</body>
</html>
